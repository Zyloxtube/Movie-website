<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CineNest — Watch Movies Free & Ad-Free</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050a14;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #eef2ff;
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 20%, rgba(70, 100, 160, 0.12), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .navbar {
            background: rgba(5, 10, 20, 0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c8a8ff, #6080ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 1.8rem;
        }

        .search-wrapper {
            display: flex;
            gap: 0.75rem;
            flex: 1;
            max-width: 500px;
        }

        .search-input {
            flex: 1;
            background: #0f1624;
            border: 1px solid #2a3452;
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            font-size: 0.95rem;
            color: #fff;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: #6a88ff;
            box-shadow: 0 0 0 3px rgba(106, 136, 255, 0.2);
        }

        .search-btn {
            background: #2d3e6e;
            border: none;
            padding: 0 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .search-btn:hover {
            background: #4a68b5;
            transform: scale(0.97);
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 500;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 210px));
            gap: 1.8rem;
            justify-content: center;
        }

        .movie-card {
            background: #0f1524;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s;
            border: 1px solid #242e48;
            box-shadow: 0 10px 18px -8px rgba(0, 0, 0, 0.5);
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 28px -12px black;
            border-color: #6a82c0;
        }

        .movie-poster {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            background: #070b14;
            display: block;
        }

        .movie-info-card {
            padding: 0.8rem 0.8rem 1rem;
        }

        .movie-title-card {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-year-card {
            font-size: 0.75rem;
            color: #9aa9cf;
            margin-top: 0.25rem;
        }

        .empty-state {
            text-align: center;
            color: #7f8db0;
            padding: 3rem;
            font-size: 1rem;
        }

        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: #8c9ac0;
        }

        .detail-panel {
            margin-top: 2.5rem;
            background: #0c111e;
            border-radius: 28px;
            border: 1px solid #212b44;
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-header {
            padding: 1.5rem 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid #20273e;
        }

        .detail-title {
            font-size: 1.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .badge {
            background: #1e2842;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .detail-body {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 2rem;
            padding: 2rem;
        }

        .detail-poster {
            width: 200px;
            border-radius: 20px;
            box-shadow: 0 12px 24px -10px black;
            object-fit: cover;
        }

        .detail-text {
            flex: 1;
            min-width: 220px;
        }

        .detail-text p {
            margin: 0.7rem 0;
            line-height: 1.5;
            color: #cfdaf5;
        }

        .detail-text strong {
            color: #b2c0ff;
        }

        .genre-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }

        .genre-tag {
            background: #19213a;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .player-section {
            margin: 0 2rem 2rem 2rem;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 12px 28px -10px rgba(0, 0, 0, 0.6);
        }

        .video-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #03060c;
            position: relative;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.6), #000000aa);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            z-index: 5;
        }

        .play-overlay:hover {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
        }

        .play-btn-large {
            background: #e50b1a;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.7rem;
            box-shadow: 0 0 20px rgba(229, 11, 26, 0.5);
            transition: transform 0.1s;
        }

        .play-btn-large:hover {
            transform: scale(1.02);
        }

        .play-label {
            margin-top: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .no-stream {
            background: #101624;
            padding: 2rem;
            text-align: center;
            border-radius: 20px;
            color: #a5b3dc;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 2rem;
            padding-bottom: 1rem;
            color: #5f6d93;
        }

        @media (max-width: 700px) {
            .navbar {
                padding: 0.8rem 1rem;
            }
            .container {
                padding: 0 1rem;
            }
            .detail-body {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .genre-tags {
                justify-content: center;
            }
            .detail-title {
                font-size: 1.3rem;
            }
            .player-section {
                margin: 0 1rem 1.5rem 1rem;
            }
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">
            <span class="logo-icon">🎬</span>
            <span>CineNest</span>
        </div>
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Search any movie... (Inception, Dune, Batman, Avatar)" autocomplete="off">
            <button id="searchBtn" class="search-btn">Search</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="section-header">
        <h2 class="section-title" id="resultsTitle">🎥 Popular Movies</h2>
    </div>
    <div id="resultsContainer">
        <div class="loading-spinner">✨ Loading amazing movies...</div>
    </div>
    <div id="detailContainer"></div>
    <div class="footer-note">🎬 Direct streaming • No ads • No signup • Instant playback</div>
</div>

<script>
    const API_BASE = '';

    async function searchMovies(query) {
        const container = document.getElementById('resultsContainer');
        const titleEl = document.getElementById('resultsTitle');
        
        if (!query.trim()) {
            titleEl.textContent = '🎥 Popular Movies';
            loadDefaultMovies();
            return;
        }
        
        titleEl.textContent = `🔍 Search results for "${escapeHtml(query)}"`;
        container.innerHTML = '<div class="loading-spinner">🔎 Searching...</div>';
        document.getElementById('detailContainer').innerHTML = '';
        
        try {
            const response = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            if (data.results && data.results.length > 0) {
                renderMovieGrid(data.results);
            } else {
                container.innerHTML = '<div class="empty-state">😕 No movies found. Try a different title.</div>';
            }
        } catch (error) {
            console.error('Search error:', error);
            container.innerHTML = '<div class="empty-state">⚠️ Connection error. Please try again.</div>';
        }
    }

    async function loadDefaultMovies() {
        try {
            const response = await fetch(`${API_BASE}/api/search?q=popular`);
            const data = await response.json();
            if (data.results && data.results.length > 0) {
                renderMovieGrid(data.results.slice(0, 12));
            } else {
                renderFallbackGrid();
            }
        } catch (error) {
            console.error('Default load error:', error);
            renderFallbackGrid();
        }
    }

    function renderFallbackGrid() {
        const fallbackMovies = [
            { id: 'tt1375666', title: 'Inception', year: '2010', poster: 'https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5UUF.jpg' },
            { id: 'tt1160419', title: 'Dune', year: '2021', poster: 'https://image.tmdb.org/t/p/w500/d5NXSklXo0qyIYkgV94XAgMIckC.jpg' },
            { id: 'tt1119646', title: 'The Batman', year: '2022', poster: 'https://image.tmdb.org/t/p/w500/74xTEg7MFy0c5YV8dR1i1yHpJ5G.jpg' },
            { id: 'tt1630029', title: 'Avatar: The Way of Water', year: '2022', poster: 'https://image.tmdb.org/t/p/w500/t6HIqrRAclMCA60NsSmeqe9RmNV.jpg' },
            { id: 'tt20240344', title: 'John Wick: Chapter 4', year: '2023', poster: 'https://image.tmdb.org/t/p/w500/vZloFAK7NmvMGKE7VkF5UHaz0I.jpg' },
            { id: 'tt6710474', title: 'Everything Everywhere All at Once', year: '2022', poster: 'https://image.tmdb.org/t/p/w500/w3LxiVYdWWRvEVdn5RYq6jIqkb1.jpg' },
        ];
        renderMovieGrid(fallbackMovies);
    }

    function renderMovieGrid(movies) {
        const container = document.getElementById('resultsContainer');
        if (!movies.length) {
            container.innerHTML = '<div class="empty-state">No movies to display.</div>';
            return;
        }
        
        const grid = document.createElement('div');
        grid.className = 'movies-grid';
        
        movies.forEach(movie => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => fetchMovieDetails(movie.id);
            
            const posterUrl = movie.poster && movie.poster !== 'N/A' ? movie.poster : 'https://image.tmdb.org/t/p/w500/xgOFQhQmyqE5yK2Q9nJ2Cp2eJ0f.jpg';
            
            card.innerHTML = `
                <img class="movie-poster" src="${posterUrl}" alt="${escapeHtml(movie.title)}" loading="lazy" onerror="this.src='https://image.tmdb.org/t/p/w500/xgOFQhQmyqE5yK2Q9nJ2Cp2eJ0f.jpg'">
                <div class="movie-info-card">
                    <div class="movie-title-card">${escapeHtml(movie.title)}</div>
                    <div class="movie-year-card">${movie.year || '—'}</div>
                </div>
            `;
            grid.appendChild(card);
        });
        
        container.innerHTML = '';
        container.appendChild(grid);
    }

    async function fetchMovieDetails(imdbId) {
        const detailContainer = document.getElementById('detailContainer');
        detailContainer.innerHTML = '<div class="loading-spinner">📀 Loading movie details...</div>';
        
        try {
            const response = await fetch(`${API_BASE}/api/movie/${imdbId}`);
            const movie = await response.json();
            renderMovieDetail(movie);
        } catch (error) {
            console.error('Detail error:', error);
            detailContainer.innerHTML = '<div class="empty-state">❌ Failed to load movie details. Please try again.</div>';
        }
    }

    function renderMovieDetail(movie) {
        const container = document.getElementById('detailContainer');
        
        const posterUrl = movie.poster || 'https://image.tmdb.org/t/p/w500/xgOFQhQmyqE5yK2Q9nJ2Cp2eJ0f.jpg';
        const genres = movie.genres || [];
        const rating = movie.rating || 'N/A';
        const ratingCount = movie.ratingCount ? Number(movie.ratingCount).toLocaleString() : 0;
        const runtime = movie.runtime ? `${movie.runtime} min` : '—';
        const castList = movie.cast || [];
        const directors = movie.directors || [];
        const plot = movie.plot || 'No synopsis available.';
        const typeBadge = movie.type === 'TV Series' ? '📺 Series' : '🎬 Movie';
        const streamUrl = movie.streamUrl;
        
        const html = `
            <div class="detail-panel">
                <div class="detail-header">
                    <div class="detail-title">
                        ${escapeHtml(movie.title)} 
                        <span class="badge">${movie.year || '—'}</span>
                        <span class="badge">${typeBadge}</span>
                    </div>
                </div>
                <div class="detail-body">
                    <img class="detail-poster" src="${posterUrl}" alt="${escapeHtml(movie.title)}" onerror="this.src='https://image.tmdb.org/t/p/w500/xgOFQhQmyqE5yK2Q9nJ2Cp2eJ0f.jpg'">
                    <div class="detail-text">
                        <p><strong>⭐ Rating:</strong> ${rating} / 10 ${ratingCount ? `(${ratingCount} votes)` : ''}</p>
                        <p><strong>⏱️ Runtime:</strong> ${runtime}</p>
                        <p><strong>🎭 Genres:</strong></p>
                        <div class="genre-tags">${genres.map(g => `<span class="genre-tag">${escapeHtml(g)}</span>`).join('')}</div>
                        <p><strong>🎬 Director${directors.length !== 1 ? 's' : ''}:</strong> ${directors.map(d => escapeHtml(d)).join(', ') || '—'}</p>
                        <p><strong>🌟 Cast:</strong> ${castList.slice(0, 6).map(c => escapeHtml(c)).join(', ') || '—'}</p>
                        <p><strong>📖 Plot:</strong> ${escapeHtml(plot)}</p>
                        <p><strong>🔗 IMDb:</strong> <a href="${movie.imdbUrl}" target="_blank" style="color:#7b93ff;">View on IMDb →</a></p>
                    </div>
                </div>
                <div class="player-section">
                    <div class="video-box" id="videoBox">
                        <div id="playOverlay" class="play-overlay">
                            <div class="play-btn-large">
                                <span>▶</span>
                            </div>
                            <div class="play-label">WATCH NOW • NO ADS</div>
                        </div>
                        <div id="iframeWrapper" style="width:100%;height:100%;display:none;"></div>
                    </div>
                </div>
            </div>
        `;
        
        container.innerHTML = html;
        
        const overlay = document.getElementById('playOverlay');
        const iframeWrapper = document.getElementById('iframeWrapper');
        
        if (overlay && iframeWrapper && streamUrl) {
            overlay.addEventListener('click', () => {
                const iframe = document.createElement('iframe');
                iframe.src = streamUrl;
                iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen';
                iframe.allowFullscreen = true;
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                
                iframeWrapper.style.display = 'block';
                iframeWrapper.appendChild(iframe);
                overlay.style.display = 'none';
            });
        } else if (!streamUrl) {
            const videoBox = document.getElementById('videoBox');
            if (videoBox && overlay) {
                overlay.innerHTML = '<div class="no-stream" style="background:transparent;">⚠️ Stream temporarily unavailable</div>';
            }
        }
        
        container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    const searchBtn = document.getElementById('searchBtn');
    const searchInput = document.getElementById('searchInput');
    
    searchBtn.addEventListener('click', () => {
        searchMovies(searchInput.value);
    });
    
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            searchMovies(searchInput.value);
        }
    });
    
    loadDefaultMovies();
</script>
</body>
</html>
