<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CineNest — Watch Movies & TV Shows</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #eef2ff;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c8a8ff, #6080ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .search-wrapper {
            display: flex;
            gap: 0.75rem;
            flex: 1;
            max-width: 500px;
        }

        .search-input {
            flex: 1;
            background: #111724;
            border: 1px solid #2a3452;
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            font-size: 0.95rem;
            color: #fff;
            outline: none;
        }

        .search-input:focus {
            border-color: #6a88ff;
            box-shadow: 0 0 0 3px rgba(106, 136, 255, 0.2);
        }

        .search-btn {
            background: #2d3e6e;
            border: none;
            padding: 0 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-btn:hover {
            background: #4a68b5;
            transform: scale(0.97);
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 220px));
            gap: 1.8rem;
            justify-content: center;
        }

        .movie-card {
            background: #111724;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s;
            border: 1px solid #242e48;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 28px -12px black;
            border-color: #6a82c0;
        }

        .movie-poster {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            background: #070b14;
        }

        .movie-info-card {
            padding: 0.8rem;
        }

        .movie-title-card {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-type {
            font-size: 0.7rem;
            color: #8a98c0;
            margin-top: 0.2rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #8c9ac0;
        }

        .detail-panel {
            margin-top: 2rem;
            background: #0c111e;
            border-radius: 24px;
            border: 1px solid #212b44;
            overflow: hidden;
        }

        .detail-header {
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid #20273e;
        }

        .detail-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .detail-body {
            display: flex;
            gap: 2rem;
            padding: 1.5rem;
            flex-wrap: wrap;
        }

        .detail-poster {
            width: 180px;
            border-radius: 16px;
            object-fit: cover;
        }

        .detail-text {
            flex: 1;
        }

        .detail-text p {
            margin: 0.5rem 0;
            line-height: 1.5;
            color: #cfdaf5;
        }

        .player-container {
            margin: 0 1.5rem 1.5rem 1.5rem;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 16 / 9;
            position: relative;
        }

        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #e50b1a;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 0 20px rgba(229, 11, 26, 0.5);
            transition: transform 0.1s;
        }

        .play-btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }

        .episode-selector {
            padding: 1rem 1.5rem;
            background: #0a0f18;
            border-top: 1px solid #1a2235;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        select, button {
            background: #1a2235;
            border: 1px solid #2a3452;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 2rem;
            padding-bottom: 1rem;
            color: #5f6d93;
        }

        @media (max-width: 700px) {
            .navbar {
                padding: 0.8rem 1rem;
            }
            .container {
                padding: 0 1rem;
            }
            .detail-body {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <div class="logo">🎬 CineNest</div>
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="Search any movie or TV show... (Squid Game, Inception, Dune)" autocomplete="off">
                <button id="searchBtn" class="search-btn">Search</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="resultsContainer">
            <div class="loading">🔍 Search for any movie or TV show...</div>
        </div>
        <div id="detailContainer"></div>
        <div class="footer">🎬 Streaming from moviefan.org • Click play to watch</div>
    </div>

    <script>
        let currentSlugUrl = '';
        let currentMediaType = '';

        async function searchMovies() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const container = document.getElementById('resultsContainer');
            container.innerHTML = '<div class="loading">🔎 Searching...</div>';
            document.getElementById('detailContainer').innerHTML = '';

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.data && data.data.length > 0) {
                    renderResults(data.data);
                } else {
                    container.innerHTML = '<div class="loading">😕 No results found. Try another title.</div>';
                }
            } catch (error) {
                console.error('Search error:', error);
                container.innerHTML = '<div class="loading">⚠️ Error searching. Please try again.</div>';
            }
        }

        function renderResults(results) {
            const container = document.getElementById('resultsContainer');
            const grid = document.createElement('div');
            grid.className = 'movies-grid';

            results.forEach(item => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                const title = item.t || 'Unknown';
                const slugUrl = item.s;
                const mediaType = item.d === 's' ? 'TV Series' : 'Movie';
                const posterUrl = item.p || 'https://via.placeholder.com/300x450?text=No+Poster';
                
                card.onclick = () => fetchMovieVideo(slugUrl, title, posterUrl, item.d);
                
                card.innerHTML = `
                    <img class="movie-poster" src="${posterUrl}" alt="${title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                    <div class="movie-info-card">
                        <div class="movie-title-card">${escapeHtml(title)}</div>
                        <div class="movie-type">${mediaType}</div>
                    </div>
                `;
                grid.appendChild(card);
            });

            container.innerHTML = '';
            container.appendChild(grid);
        }

        async function fetchMovieVideo(slugUrl, title, poster, typeCode) {
            currentSlugUrl = slugUrl;
            currentMediaType = typeCode;
            
            const detailContainer = document.getElementById('detailContainer');
            detailContainer.innerHTML = '<div class="loading">📀 Loading video... This may take a moment.</div>';

            try {
                const response = await fetch(`/api/movie/${encodeURIComponent(slugUrl)}`);
                const data = await response.json();

                if (data.error) {
                    detailContainer.innerHTML = `<div class="loading">❌ ${data.error}</div>`;
                    return;
                }

                const isTv = typeCode === 's';
                const finalPoster = data.poster || poster;
                
                let html = `
                    <div class="detail-panel">
                        <div class="detail-header">
                            <div class="detail-title">${escapeHtml(data.title || title)}</div>
                            <div style="font-size:0.8rem; color:#8a98c0; margin-top:0.3rem;">${isTv ? '📺 TV Series' : '🎬 Movie'}</div>
                        </div>
                        <div class="detail-body">
                            <img class="detail-poster" src="${finalPoster}" alt="${escapeHtml(title)}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                            <div class="detail-text">
                                <p>Click the play button below to start watching.</p>
                            </div>
                        </div>
                        <div class="player-container" id="playerContainer">
                            <div class="play-btn" id="playBtn">▶</div>
                            <div id="iframeWrapper" style="width:100%;height:100%;display:none;"></div>
                        </div>
                `;
                
                if (isTv) {
                    html += `
                        <div class="episode-selector">
                            <span>📺 Season:</span>
                            <input type="number" id="seasonNum" min="1" value="1" style="width:70px;">
                            <span>Episode:</span>
                            <input type="number" id="episodeNum" min="1" value="1" style="width:70px;">
                            <button id="loadEpisodeBtn">Load Episode</button>
                        </div>
                    `;
                }
                
                html += `</div>`;
                detailContainer.innerHTML = html;
                
                // Setup play button with the video URL
                const playBtn = document.getElementById('playBtn');
                const iframeWrapper = document.getElementById('iframeWrapper');
                
                if (playBtn && iframeWrapper && data.videoUrl) {
                    playBtn.addEventListener('click', () => {
                        const iframe = document.createElement('iframe');
                        iframe.src = data.videoUrl;
                        iframe.allow = 'accelerometer; autoplay; fullscreen';
                        iframe.allowFullscreen = true;
                        iframeWrapper.style.display = 'block';
                        iframeWrapper.appendChild(iframe);
                        playBtn.style.display = 'none';
                    });
                } else if (playBtn && !data.videoUrl) {
                    playBtn.style.background = '#555';
                    playBtn.style.cursor = 'not-allowed';
                    playBtn.title = 'Video URL not available';
                }
                
                // Setup TV episode selector
                if (isTv) {
                    const loadBtn = document.getElementById('loadEpisodeBtn');
                    if (loadBtn) {
                        loadBtn.addEventListener('click', async () => {
                            const season = document.getElementById('seasonNum').value;
                            const episode = document.getElementById('episodeNum').value;
                            
                            const newPlayBtn = document.getElementById('playBtn');
                            const newIframeWrapper = document.getElementById('iframeWrapper');
                            
                            if (newPlayBtn) newPlayBtn.style.display = 'flex';
                            if (newIframeWrapper) {
                                newIframeWrapper.innerHTML = '';
                                newIframeWrapper.style.display = 'none';
                            }
                            
                            try {
                                const episodeResponse = await fetch(`/api/tv/${encodeURIComponent(slugUrl)}?season=${season}&episode=${episode}`);
                                const episodeData = await episodeResponse.json();
                                
                                if (episodeData.videoUrl && newPlayBtn && newIframeWrapper) {
                                    newPlayBtn.onclick = () => {
                                        const iframe = document.createElement('iframe');
                                        iframe.src = episodeData.videoUrl;
                                        iframe.allow = 'accelerometer; autoplay; fullscreen';
                                        iframe.allowFullscreen = true;
                                        newIframeWrapper.style.display = 'block';
                                        newIframeWrapper.appendChild(iframe);
                                        newPlayBtn.style.display = 'none';
                                    };
                                }
                            } catch (error) {
                                console.error('Error loading episode:', error);
                            }
                        });
                    }
                }
                
                detailContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
                
            } catch (error) {
                console.error('Video error:', error);
                detailContainer.innerHTML = '<div class="loading">❌ Failed to load video. Please try again.</div>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Event listeners
        document.getElementById('searchBtn').addEventListener('click', searchMovies);
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchMovies();
        });
        
        // Load default popular movies on start
        setTimeout(() => {
            document.getElementById('searchInput').value = 'popular';
            searchMovies();
        }, 100);
    </script>
</body>
</html>
